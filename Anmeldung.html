<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taekwondo Anmeldung</title>
    <link rel="stylesheet" href="Anmeldung.css">
</head>
<body>

    <div class="container">
        <h1>🥋 Taekwondo</h1>
        <p class="subtitle">Anmeldung zur Meisterschaft</p>

        <form id="anmeldeForm">
            <div class="form-group">
                <label class="required">Vor- und Nachname</label>
                <input type="text" id="name"placeholder="Max Mustermann" required >
            </div>

            <div class="form-group">
                <label class="required">E-Mail Adresse</label>
                <input type="email" id="email" placeholder="max@beispiel.de" required >
            </div>

            <div class="form-group">
                <label class="required">Geschlecht</label>
                <div class="radio-group">
                    <label class="radio-label" onclick="selectGender(this, 'männlich')">
                        <input type="radio" name="geschlecht" value="männlich" required>
                        <span>Männlich</span>
                    </label>
                    <label class="radio-label" onclick="selectGender(this, 'weiblich')">
                        <input type="radio" name="geschlecht" value="weiblich" required>
                        <span>Weiblich</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="required">Geburtsdatum</label>
                <input type="date" id="geburtsdatum" required>
            </div>

            <div class="form-group">
                <label class="required">Disziplin</label>
                <select id="disziplin" required>
                    <option value="">-- Bitte wählen --</option>
                    <option value="poomsae">Poomsae (Schattenkampf)</option>
                    <option value="kyorugi">Kyorugi (Kampf)</option>
                    <option value="beide">Beide</option>
                </select>
            </div>

            <div class="form-group">
                <label class="required">Gewicht in kg</label>
                <input type="number" id="gewicht" min="20" max="150" step="0.5" required placeholder="z.B. 65.5">
            </div>

            <div class="form-group">
                <label class="required">Gürtelfarbe</label>
                <select id="guertel" required onchange="checkBlackBelt()">
                    <option value="">-- Bitte wählen --</option>
                    <option value="weiss">⚪ Weiß (10. Kup)</option>
                    <option value="gelb">🟡 Gelb (9.-8. Kup)</option>
                    <option value="gruen">🟢 Grün (7.-6. Kup)</option>
                    <option value="blau">🔵 Blau (5.-4. Kup)</option>
                    <option value="rot">🔴 Rot (3.-2. Kup)</option>
                    <option value="schwarz">⚫ Schwarz (1. Kup - Dan)</option>
                </select>

                <div id="danBox" class="dan-box">
                    <div class="dan-title">
                        ⚫⚡ Schwarzer Gürtel - Dan Grad wählen
                    </div>
                    <select id="danGrad" class="dan-select">
                        <option value="">-- Dan Grad --</option>
                        <option value="1. Pum">1. Pum (Kinder Schwarzgurt)</option>
                        <option value="1. Dan">1. Dan</option>
                        <option value="2. Dan">2. Dan</option>
                        <option value="3. Dan">3. Dan</option>
                        <option value="4. Dan">4. Dan</option>
                        <option value="5. Dan">5. Dan</option>
                        <option value="6. Dan">6. Dan</option>
                        <option value="7. Dan">7. Dan</option>
                        <option value="8. Dan">8. Dan</option>
                        <option value="9. Dan">9. Dan</option>
                    </select>
                    <div class="dan-info">
                        ℹ️ Pum = Kinder-Schwarzgurt (bis 15 Jahre), Dan = Erwachsenen-Schwarzgurt
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="required">Verein</label>
                <textarea id="verein" required placeholder="Name des Vereins und Ort"></textarea>
            </div>

            <button type="submit">Anmeldung absenden</button>
        </form>

        <div class="link">
            <a href="uebersicht.html">📋 Alle Anmeldungen anzeigen</a>
        </div>
    </div>

    <script>

        function selectGender(element, value) {
            document.querySelectorAll('.radio-label').forEach(label => {
                label.classList.remove('selected');
            });
            element.classList.add('selected');
            element.querySelector('input').checked = true;
        }

        function checkBlackBelt() {
            const guertel = document.getElementById('guertel').value;
            const danBox = document.getElementById('danBox');
            const danGrad = document.getElementById('danGrad');

            if (guertel === 'schwarz') {
                danBox.style.display = 'block';
                danGrad.required = true;
            } else {
                danBox.style.display = 'none';
                danGrad.required = false;
                danGrad.value = '';
            }
        }

        document.getElementById('anmeldeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const geschlecht = document.querySelector('input[name="geschlecht"]:checked')?.value;
            if (!geschlecht) {
                alert('Bitte wähle ein Geschlecht aus!');
                return;
            }

            const guertel = document.getElementById('guertel').value;
            let guertelText = guertel;
            
            if (guertel === 'schwarz') {
                const dan = document.getElementById('danGrad').value;
                if (!dan) {
                    alert('Bitte wähle einen Dan-Grad aus!');
                    return;
                }
                guertelText = 'Schwarz (' + dan + ')';
            }

            const teilnehmer = {
                id: Date.now(),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                geschlecht: geschlecht,
                geburtsdatum: document.getElementById('geburtsdatum').value,
                disziplin: document.getElementById('disziplin').value,
                gewicht: document.getElementById('gewicht').value,
                guertel: guertelText,
                verein: document.getElementById('verein').value
            };

            let anmeldungen = JSON.parse(localStorage.getItem('taekwondoAnmeldungen')) || [];
            anmeldungen.push(teilnehmer);
            localStorage.setItem('taekwondoAnmeldungen', JSON.stringify(anmeldungen));

            document.getElementById('successMsg').style.display = 'block';
            this.reset();
            document.querySelectorAll('.radio-label').forEach(label => {
                label.classList.remove('selected');
            });
            document.getElementById('danBox').style.display = 'none';

            setTimeout(function() {
                window.location.href = 'uebersicht.html';
            }, 1500);
        });
    </script>
</body>
</html>
